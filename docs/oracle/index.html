9</td><td>684</td><td>0.81</td></tr><tr><td>$64,000</td><td>1878</td><td>349</td><td>0.19</td></tr><tr><td>$65,000</td><td>1748</td><td>215</td><td>0.12</td></tr><tr><td>$66,000</td><td>1591</td><td>74</td><td>0.05</td></tr><tr><td>$68,000</td><td>1693</td><td>20</td><td>0.01</td></tr></tbody>\n      </table>\n    </div>\n    <div class=\"card\" style=\"border-color:var(--acc)\">\n      <div class=\"ct\">Oracle Insight</div>\n      <div style=\"font-size:10px;line-height:1.7\">Claude API not configured</div>\n      \n    </div>\n  </div>\n</div>\n\n<div class=\"foot\">GEX Oracle v2.0 | S23 | 6h auto | Not investment advice</div>\n</body>\n</html>";
async function sha256(s){
  const b=new TextEncoder().encode(s);
  const h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
async function check(){
  const pw=document.getElementById('pw').value;
  const h=await sha256(pw);
  if(h===HASH){
    document.open('text/html','replace');
    document.write(DATA);
    document.close();
  }else{
    document.getElementById('err').textContent='Wrong password';
    document.getElementById('pw').value='';
  }
}
document.getElementById('pw').focus();
