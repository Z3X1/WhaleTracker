iv>\n    </div>\n    <div class=\"card\">\n      <div class=\"ct\">GEX Structure</div>\n      <div class=\"row\"><span>GEX Pin (3JUL26)</span><span style=\"color:var(--yellow)\">$60,591</span></div>\n      <div class=\"row\"><span>PCR (3JUL26)</span><span>0.633</span></div>\n      <div class=\"row\"><span>PCR (31JUL26)</span><span>0.456</span></div>\n      <div class=\"row\"><span>PCR (25SEP26)</span><span>0.600</span></div>\n      <div class=\"row\"><span>Spot vs Pin</span><span style=\"color:var(--yellow)\">+0</span></div>\n    </div>\n  </div>\n  <div>\n    <div class=\"card\" style=\"margin-bottom:12px\">\n      <div class=\"ct\">UFT v2.0 Equation</div>\n      <div class=\"row\"><span>GBM (x0.40)</span><span>$24,324</span></div>\n      <div class=\"row\"><span>GEX (x0.10)</span><span>$6,059</span></div>\n      <div class=\"row\"><span>Behavior (x0.28)</span><span>$17,064</span></div>\n      <div class=\"row\"><span>Bayesian (x0.12)</span><span>$7,307</span></div>\n      <div class=\"row\"><span>TimeDecay (x0.10)</span><span>$6,059</span></div>\n      <div class=\"big\">$60,813</div>\n      <div class=\"muted\">Mode=$60,591 | EMH=$60,591</div>\n    </div>\n    <div class=\"card\" style=\"border-color:var(--accent)\">\n      <div class=\"ct\">Oracle Insight</div>\n      <div style=\"font-size:10px;line-height:1.7;color:var(--text)\">Claude API not configured</div>\n    </div>\n  </div>\n</div>\n\n<div class=\"foot\">GEX Oracle v2.0 | S23 | Updates every 6h | Not investment advice</div>\n</body>\n</html>";
async function sha256(s){
  const b=new TextEncoder().encode(s);
  const h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
async function check(){
  const pw=document.getElementById('pw').value;
  const h=await sha256(pw);
  if(h===HASH){
    document.open('text/html','replace');
    document.write(DATA);
    document.close();
  }else{
    document.getElementById('err').textContent='Wrong password';
    document.getElementById('pw').value='';
  }
}
