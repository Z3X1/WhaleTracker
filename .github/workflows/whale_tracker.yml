name: SideProject_WhaleTracker (Hourly)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable debug output'
        required: false
        default: 'false'

concurrency:
  group: whale-tracker
  cancel-in-progress: false

jobs:
  collect-and-analyze:
    name: Whale Data Collection & Signal Generation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Restore whale database
        uses: actions/cache@v4
        with:
          path: data/whale.db
          key: whale-db-${{ github.run_number }}
          restore-keys: |
            whale-db-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Diagnose API connectivity
        run: |
          echo "=== API Connectivity Test ==="
          python3 - << 'PYEOF'
          import requests, json, os

          TEST_ADDR = "34xp4vRoCGJym3xR7yCVPFHoCNxv4Twseo"

          apis = {
              "mempool.space":    f"https://mempool.space/api/address/{TEST_ADDR}",
              "blockstream.info": f"https://blockstream.info/api/address/{TEST_ADDR}",
              "blockchain.info":  f"https://blockchain.info/rawaddr/{TEST_ADDR}?limit=1",
              "bitaps.com":       f"https://api.bitaps.com/btc/v1/blockchain/address/state/{TEST_ADDR}",
              "sochain.com":      f"https://sochain.com/api/v2/get_address_balance/BTC/{TEST_ADDR}",
          }

          results = {}
          for name, url in apis.items():
              try:
                  r = requests.get(url, timeout=10, headers={"User-Agent": "GEX-Oracle/2.1"})
                  results[name] = r.status_code
                  icon = "✅" if r.status_code == 200 else "❌"
                  print(f"  {icon} {name}: HTTP {r.status_code}")
                  if r.status_code == 200:
                      d = r.json()
                      print(f"     sample keys: {list(d.keys())[:5]}")
              except Exception as e:
                  results[name] = str(e)[:60]
                  print(f"  ❌ {name}: {str(e)[:60]}")

          working = [k for k, v in results.items() if v == 200]
          os.makedirs("data", exist_ok=True)
          with open("data/api_probe.json", "w") as f:
              json.dump({"results": results, "working": working}, f, indent=2)
          print(f"\nWorking APIs: {working}")
          PYEOF

      - name: Run whale tracker
        run: python src/whale_tracker.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Generate Oracle signal
        run: python src/signal_bridge.py

      - name: Write job summary
        if: always()
        run: |
          echo "## 🐳 SideProject_WhaleTracker Signal Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run time**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/api_probe.json ]; then
            echo "### API Connectivity" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          d = json.load(open('data/api_probe.json'))
          for k, v in d['results'].items():
              icon = '✅' if v == 200 else '❌'
              print(f'- {icon} {k}: {v}')
            " >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f data/oracle_signal.json ]; then
            SCORE=$(python3 -c "import json; d=json.load(open('data/oracle_signal.json')); print(d['whale_signal']['raw_score'])")
            TREND=$(python3 -c "import json; d=json.load(open('data/oracle_signal.json')); print(d['whale_signal']['trend'])")
            TRACKED=$(python3 -c "import json; d=json.load(open('data/latest_summary.json')); print(d.get('addresses_tracked',0))")
            NARRATIVE=$(python3 -c "import json; d=json.load(open('data/oracle_signal.json')); print(d['narrative'])")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Signal Score | \`${SCORE}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Trend | ${TREND} |" >> $GITHUB_STEP_SUMMARY
            echo "| Addresses Tracked | ${TRACKED} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ${NARRATIVE}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit data updates
        run: |
          git config user.name  "GEX Oracle Bot"
          git config user.email "gex-oracle@noreply.github.com"
          git add data/latest_summary.json data/oracle_signal.json data/api_probe.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore(data): whale snapshot $(date -u '+%Y-%m-%dT%H:00Z')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Check hard triggers
        run: |
          python3 -c "
          import json, sys
          with open('data/oracle_signal.json') as f:
              d = json.load(f)
          triggers = d['whale_signal']['hard_triggers']
          if triggers:
              for t in triggers:
                  print(f'  ⚡ [{t[\"type\"]}] {t[\"message\"]}')
              sys.exit(2)
          else:
              print('✅ No hard triggers')
          "
        continue-on-error: true

  daily-report:
    name: Daily Whale Behavior Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && startsWith(github.event.schedule, '0 0')
    needs: collect-and-analyze

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/cache@v4
        with:
          path: data/whale.db
          key: whale-db-${{ github.run_number }}
          restore-keys: |
            whale-db-
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python src/daily_report.py
      - name: Commit daily report
        run: |
          git config user.name  "GEX Oracle Bot"
          git config user.email "gex-oracle@noreply.github.com"
          DATE=$(date -u '+%Y-%m-%d')
          git add "data/daily_${DATE}.json" dashboard/whale_dashboard.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "feat(report): daily whale report ${DATE}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
