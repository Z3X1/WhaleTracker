name: GEX Oracle - Whale Tracker (Hourly)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      debug_mode:
        description: '啟用 debug 輸出'
        required: false
        default: 'false'

concurrency:
  group: whale-tracker
  cancel-in-progress: false

jobs:
  collect-and-analyze:
    name: 鯨魚數據採集 & 信號生成
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Restore whale database
        uses: actions/cache@v4
        with:
          path: data/whale.db
          key: whale-db-${{ github.run_number }}
          restore-keys: |
            whale-db-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run whale tracker
        run: python src/whale_tracker.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Generate Oracle signal
        run: python src/signal_bridge.py

      - name: Write job summary
        if: always()
        run: |
          echo "## 🐳 GEX Oracle 鯨魚信號報告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**執行時間**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/oracle_signal.json ]; then
            SCORE=$(python -c "import json; d=json.load(open('data/oracle_signal.json')); print(d['whale_signal']['raw_score'])")
            TREND=$(python -c "import json; d=json.load(open('data/oracle_signal.json')); print(d['whale_signal']['trend'])")
            TRIGGERS=$(python -c "import json; d=json.load(open('data/oracle_signal.json')); print(len(d['whale_signal']['hard_triggers']))")
            NARRATIVE=$(python -c "import json; d=json.load(open('data/oracle_signal.json')); print(d['narrative'])")
            echo "| 指標 | 數值 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| 信號評分 | \`${SCORE}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| 趨勢 | ${TREND} |" >> $GITHUB_STEP_SUMMARY
            echo "| 硬性觸發 | ${TRIGGERS} 個 |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ${NARRATIVE}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ 信號文件未生成" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit data updates
        run: |
          git config user.name  "GEX Oracle Bot"
          git config user.email "gex-oracle@noreply.github.com"
          git add data/latest_summary.json data/oracle_signal.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore(data): whale snapshot $(date -u '+%Y-%m-%dT%H:00Z')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Check hard triggers
        run: |
          python -c "
          import json, sys
          with open('data/oracle_signal.json') as f:
            d = json.load(f)
          triggers = d['whale_signal']['hard_triggers']
          if triggers:
            print('⚡ 硬性觸發條件滿足：')
            for t in triggers:
              print(f'  - [{t[\"type\"]}] {t[\"message\"]}')
            sys.exit(2)
          else:
            print('✅ 無硬性觸發條件')
          "
        continue-on-error: true

  # 每日報告：只在 UTC 00:00 的排程觸發時執行，手動觸發不跑
  daily-report:
    name: 每日鯨魚行為報告
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && startsWith(github.event.schedule, '0 0')
    needs: collect-and-analyze

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/cache@v4
        with:
          path: data/whale.db
          key: whale-db-${{ github.run_number }}
          restore-keys: |
            whale-db-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Generate daily report
        run: python src/daily_report.py

      - name: Commit daily report
        run: |
          git config user.name  "GEX Oracle Bot"
          git config user.email "gex-oracle@noreply.github.com"
          DATE=$(date -u '+%Y-%m-%d')
          git add "data/daily_${DATE}.json" dashboard/whale_dashboard.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "feat(report): daily whale report ${DATE}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
