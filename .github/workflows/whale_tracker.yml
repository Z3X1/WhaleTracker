name: SideProject_WhaleTracker (Hourly)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable debug output'
        required: false
        default: 'false'

concurrency:
  group: whale-tracker
  cancel-in-progress: false

jobs:
  collect-and-analyze:
    name: Whale Data Collection & Signal Generation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Restore whale database
        uses: actions/cache@v4
        with:
          path: data/whale.db
          key: whale-db-${{ github.run_number }}
          restore-keys: |
            whale-db-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Diagnose API connectivity
        run: |
          python3 - << 'PYEOF'
          import requests, json, os
          TEST = "34xp4vRoCGJym3xR7yCVPFHoCNxv4Twseo"
          apis = {
              "mempool.space":    f"https://mempool.space/api/address/{TEST}",
              "blockstream.info": f"https://blockstream.info/api/address/{TEST}",
              "blockchain.info":  f"https://blockchain.info/rawaddr/{TEST}?limit=1",
          }
          results = {}
          for name, url in apis.items():
              try:
                  r = requests.get(url, timeout=10, headers={"User-Agent": "GEX-Oracle/2.3"})
                  results[name] = r.status_code
                  print(f"  {'✅' if r.status_code==200 else '❌'} {name}: HTTP {r.status_code}")
              except Exception as e:
                  results[name] = str(e)[:50]
                  print(f"  ❌ {name}: {str(e)[:50]}")
          working = [k for k,v in results.items() if v == 200]
          os.makedirs("data", exist_ok=True)
          with open("data/api_probe.json","w") as f:
              json.dump({"results": results, "working": working}, f, indent=2)
          print(f"Working APIs: {working}")
          PYEOF

      - name: Run whale tracker
        run: python src/whale_tracker.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Generate Oracle signal
        run: python src/signal_bridge.py

      - name: Generate dashboard (every run)
        run: python src/daily_report.py

      - name: Write job summary
        if: always()
        run: |
          echo "## 🐳 SideProject_WhaleTracker Signal Report" >> $GITHUB_STEP_SUMMARY
          echo "**Run time**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          if [ -f data/oracle_signal.json ]; then
            SCORE=$(python3 -c "import json; d=json.load(open('data/oracle_signal.json')); print(d['whale_signal']['raw_score'])")
            TRACKED=$(python3 -c "import json; d=json.load(open('data/latest_summary.json')); print(d.get('addresses_tracked',0))")
            TXS=$(python3 -c "import json; d=json.load(open('data/latest_summary.json')); print(d.get('tx_records',0))")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Signal Score | \`${SCORE}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Addresses Tracked | ${TRACKED}/41 |" >> $GITHUB_STEP_SUMMARY
            echo "| TX Records | ${TXS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Dashboard | [View](https://z3x1.github.io/SideProject_WhaleTracker/) |" >> $GITHUB_STEP_SUMMARY
          fi


      - name: Install Oracle dependencies
        run: pip install anthropic --quiet

      - name: Run GEX Oracle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OUTPUT_DIR: docs/oracle
        run: |
          if [ -f src/gex_oracle_auto.py ]; then
            python src/gex_oracle_auto.py || echo "Oracle run failed, continuing"
          else
            echo "Oracle script not found, skipping"
          fi
      - name: Commit data + dashboard
        run: |
          git config user.name  "GEX Oracle Bot"
          git config user.email "gex-oracle@noreply.github.com"
          git add data/latest_summary.json data/oracle_signal.json data/api_probe.json 2>/dev/null || true
          git add docs/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore(data): whale snapshot $(date -u '+%Y-%m-%dT%H:00Z')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Check hard triggers
        run: |
          python3 -c "
          import json, sys
          with open('data/oracle_signal.json') as f:
              d = json.load(f)
          triggers = d['whale_signal']['hard_triggers']
          if triggers:
              for t in triggers:
                  print(f'  ⚡ [{t[\"type\"]}] {t[\"message\"]}')
              sys.exit(2)
          else:
              print('✅ No hard triggers')
          "
        continue-on-error: true
